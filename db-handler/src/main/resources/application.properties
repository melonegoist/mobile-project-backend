spring.application.name=db-handler
spring.application.version=1.0.0
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL}?serverTimezone=Europe/Moscow
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Moscow
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET}
jwt.expiration=3600000
jwt.refreshExpiration=86400000

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DB:0}
quotation.redis.channel=${QUOTATION_CHANNEL:quotes.ticks}

management.defaults.metrics.export.enabled=false
