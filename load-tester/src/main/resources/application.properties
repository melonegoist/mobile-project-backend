spring.application.name=load-tester
server.port=8081

# Virtual threads for efficient concurrency in the web layer
spring.threads.virtual.enabled=true

# Load test configuration (overridable via env vars)
load-test.target-url=${TARGET_URL:http://localhost:9090}
load-test.total-users=${TOTAL_USERS:10000}
load-test.ramp-up-seconds=${RAMP_UP_SECONDS:300}
load-test.min-action-delay-ms=${MIN_ACTION_DELAY_MS:1000}
load-test.max-action-delay-ms=${MAX_ACTION_DELAY_MS:5000}
load-test.initial-deposit=${INITIAL_DEPOSIT:100000.0}
load-test.auto-start=${AUTO_START:false}
load-test.websocket-enabled=${WEBSOCKET_ENABLED:true}

# Actuator – expose all endpoints
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.itmo.loadtester=INFO
